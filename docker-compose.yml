version: '3.8'

services:
  backend:
    build: ./backend
    container_name: study-assistant-backend
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: always

  frontend:
    build: ./frontend
    container_name: study-assistant-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always

networks:
  default:
    name: study-assistant-network
